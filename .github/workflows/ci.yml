name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ci

  macos-contract:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check:repo
      - run: npm run check
      - run: swiftc -typecheck examples/connectors/macos-life-eventkit.swift
      - run: node --import tsx --test tests/computer.test.ts tests/im-connectors.test.ts tests/macos-*-connector.test.ts
